server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # OpenHarness Agent API proxy
    # Maps /api/<path> → openharness-agent:8581/<path>
    location /api/ {
        proxy_pass             http://openharness-agent:8581/;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_read_timeout     300s;   # allow long-running agent tasks

        # Required for SSE / stream-json — disable nginx response buffering
        proxy_buffering        off;
        proxy_cache            off;
        proxy_set_header       X-Accel-Buffering no;
        # Flush each chunk to the browser immediately
        proxy_http_version     1.1;
        chunked_transfer_encoding on;
    }
}
